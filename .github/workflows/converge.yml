# Converge dogfooding itself: keep Converge's own dependencies up to date using
# Converge. One workflow, run daily — security fixes land promptly, while routine
# updates are gated to the `schedule` window in converge.json (Mondays).
name: Converge

on:
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC (routine gated by converge.json)
  workflow_dispatch: {} # run on demand from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  converge:
    runs-on: ubuntu-latest
    steps:
      - uses: Pirikara/Converge@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          apply: "true"
          strategy: "in-range" # stay within each dep's current major
          types: "minor,patch"
          limit: "10"
