name: "Converge"
description: "Safe, hands-off dependency updates — resolves what Dependabot can't, blocks what you shouldn't install."
author: "Converge"
branding:
  icon: "arrow-up-circle"
  color: "purple"

inputs:
  repository:
    description: "Target repository as owner/repo. Defaults to the repo running the workflow."
    required: false
    default: ${{ github.repository }}
  token:
    description: "GitHub token with contents:write + pull-requests:write (e.g. secrets.GITHUB_TOKEN)."
    required: true
  apply:
    description: "Open branches and PRs (true) or dry-run only (false)."
    required: false
    default: "false"
  types:
    description: "Comma-separated bump types to allow (major,minor,patch)."
    required: false
    default: "minor,patch"
  limit:
    description: "Maximum number of PRs to open in one run."
    required: false
    default: "5"
  verbose:
    description: "Enable debug logging."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Build Converge
      shell: bash
      run: |
        cd "$GITHUB_ACTION_PATH"
        npm install --no-audit --no-fund --loglevel=error
        npm run build
    - name: Run Converge
      shell: bash
      env:
        CONVERGE_TOKEN: ${{ inputs.token }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_APPLY: ${{ inputs.apply }}
        INPUT_TYPES: ${{ inputs.types }}
        INPUT_LIMIT: ${{ inputs.limit }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
      run: |
        # Inputs are passed through env (never interpolated into the script) to
        # avoid shell-injection — Converge is a security tool; it should model it.
        global=()
        [ "$INPUT_VERBOSE" = "true" ] && global+=(--verbose)
        args=("$INPUT_REPOSITORY" --types "$INPUT_TYPES" --limit "$INPUT_LIMIT")
        [ "$INPUT_APPLY" = "true" ] && args+=(--apply)
        node "$GITHUB_ACTION_PATH/dist/cli.js" "${global[@]}" run "${args[@]}"
